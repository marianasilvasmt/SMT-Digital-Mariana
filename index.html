<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #eaf3fb;
            --surface: #ffffff;
            --border: #d4e6f7;
            --border-active: #2f7de1;
            --accent: #2f7de1;
            --accent-glow: rgba(47, 125, 225, 0.18);
            --text: #15324d;
            --muted: #7c97b3;
            --error: #d23a4f;
            --error-glow: rgba(210, 58, 79, 0.15);
            --mono: 'DM Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--display);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.6;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(47, 125, 225, 0.12) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 380px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px 40px;
            box-shadow:
                0 0 0 1px rgba(47, 125, 225, 0.03),
                0 24px 64px rgba(21, 50, 77, 0.12),
                0 0 80px rgba(47, 125, 225, 0.05);
            animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .icon-wrap {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #dceaf9, #cfe3f8);
            border: 1px solid #b9d8f3;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 4px 16px rgba(47, 125, 225, 0.12);
        }

        .icon-wrap svg {
            width: 24px;
            height: 24px;
            stroke: var(--accent);
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .label-tag {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.18em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 8px;
            opacity: 0.85;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            line-height: 1.2;
        }

        .subtitle {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 36px;
            line-height: 1.6;
        }

        .field-label {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="password"] {
            width: 100%;
            padding: 13px 46px 13px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            letter-spacing: 0.12em;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            caret-color: var(--accent);
        }

        input[type="password"]::placeholder {
            color: var(--muted);
            letter-spacing: 0.04em;
        }

        input[type="password"]:focus {
            border-color: var(--border-active);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        input.error-state {
            border-color: var(--error) !important;
            box-shadow: 0 0 0 3px var(--error-glow) !important;
            animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%       { transform: translateX(-6px); }
            40%       { transform: translateX(6px); }
            60%       { transform: translateX(-4px); }
            80%       { transform: translateX(4px); }
        }

        .toggle-eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--muted);
            transition: color 0.2s;
            background: none;
            border: none;
            padding: 4px;
            display: flex;
            align-items: center;
        }
        .toggle-eye:hover { color: var(--accent-dark, var(--text)); }
        .toggle-eye svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        button#submitBtn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: #fff;
            font-family: var(--display);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(47, 125, 225, 0.25);
        }

        button#submitBtn:hover {
            opacity: 0.92;
            box-shadow: 0 6px 28px rgba(47, 125, 225, 0.38);
        }

        button#submitBtn:active {
            transform: scale(0.98);
        }

        button#submitBtn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
        }
        @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
        button#submitBtn.loading .spinner { display: block; }

        .error-msg {
            display: none;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            padding: 11px 14px;
            background: rgba(210, 58, 79, 0.06);
            border: 1px solid rgba(210, 58, 79, 0.22);
            border-radius: 8px;
            font-family: var(--mono);
            font-size: 12px;
            color: var(--error);
        }

        .error-msg.visible { display: flex; }

        .error-msg svg {
            width: 14px;
            height: 14px;
            stroke: var(--error);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </div>

        <p class="label-tag">Acesso Restrito</p>
        <h1>Área de Testes</h1>
        <p class="subtitle">Digite a senha para continuar.</p>

        <label class="field-label" for="password">Senha</label>
        <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password">
            <button class="toggle-eye" id="eyeBtn" type="button" aria-label="Mostrar/ocultar senha" onclick="toggleEye()">
                <svg id="eyeIcon" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>

        <button id="submitBtn" onclick="checkAccess()">
            Entrar
            <div class="spinner"></div>
        </button>

        <div class="error-msg" id="error">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            Senha incorreta.
        </div>
    </div>

    <script>
        // ── Configuração de segurança ──────────────────────────────────────
        // Troque o valor abaixo pelo hash SHA-256 da sua senha.
        // Veja "gerar-hash.html" (no mesmo repositório) para gerar esse valor.
        const targetHash = "7bd87f4ac5fd8e3a92d9dad0959c8d0ef834b66c77d57141b4f10c31163b720e";
        // ────────────────────────────────────────────────────────────────────

        function toggleEye() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eyeIcon');
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            icon.innerHTML = isHidden
                ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
                : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
        }

        async function checkAccess() {
            const passInput = document.getElementById('password');
            const btn       = document.getElementById('submitBtn');
            const errorEl   = document.getElementById('error');

            const pass = passInput.value;
            if (!pass) return;

            btn.classList.add('loading');
            errorEl.classList.remove('visible');
            passInput.classList.remove('error-state');

            const encoder    = new TextEncoder();
            const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(pass));
            const hashArray  = new Uint8Array(hashBuffer);
            const inputHash  = Array.from(hashArray).map(b => b.toString(16).padStart(2, '0')).join('');

            btn.classList.remove('loading');

            if (inputHash === targetHash) {
                sessionStorage.setItem('authenticated', 'true');
                window.location.href = 'home.html';
            } else {
                passInput.classList.add('error-state');
                errorEl.classList.add('visible');
                passInput.value = '';
                passInput.focus();
            }
        }

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkAccess();
            document.getElementById('password').classList.remove('error-state');
        });
    </script>
</body>
</html>
